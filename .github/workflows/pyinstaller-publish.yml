# Publish Standalone binaries and OS packages (DEB/RPM)
# Triggered on v* branches (prerelease) or v* tags (stable)

name: Package Publish

on:
  push:
    tags: ["v*"]
    branches: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYINSTALLER_OPTS: '--collect-all textual --collect-all rich --collect-all psycopg --collect-all docker --collect-all jinja2 --collect-all yaml'
  VERSION: ''
  TAG_NAME: ''
  IS_PRERELEASE: ''

jobs:
  # 1. Build Binaries for Linux, Windows, macOS
  build-binaries:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.9", "3.11"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux-amd64
          - os: windows-latest
            platform: win-amd64
          - os: macos-latest
            platform: macos-arm64

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python_version }}

      - name: Extract Version
        id: get_version
        shell: python
        run: |
            import os
            import re
            with open("pg_migrator.py", "r", encoding="utf-8") as f:
                content = f.read()
                match = re.search(r'__version__ = "([^"]+)"', content)
                version = match.group(1) if match else "unknown"
                with open(os.environ['GITHUB_ENV'], 'a', encoding="utf-8") as env:
                    env.write(f"VERSION={version}\n")
            print(f"Version extracted: {version}")

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        shell: bash
        run: |
          EXE_EXT=""
          if [ "${{ runner.os }}" == "Windows" ]; then EXE_EXT=".exe"; fi

          # Ensure clean dist directory
          rm -rf dist
          mkdir -p dist

          if [ "${{ runner.os }}" == "Linux" ]; then
            echo "Building on Linux via registry.access.redhat.com/ubi8/ubi container for glibc backward compatibility"
            docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace registry.access.redhat.com/ubi8/ubi bash -c "
              dnf install -y python3.11 python3.11-pip python3.11-devel python39 python39-pip python39-devel gcc &&
              if [ '${{ matrix.python_version }}' = '3.9' ]; then
                PYTHON_CMD=python3.9
                PIP_CMD=pip3.9
              else
                PYTHON_CMD=python3.11
                PIP_CMD=pip3.11
              fi &&
              \$PIP_CMD install pyinstaller -r requirements.txt &&
              \$PYTHON_CMD -m PyInstaller --onefile --name pg_migrator --add-data 'src:src' --add-data 'config_migrator.sample.ini:.' $PYINSTALLER_OPTS pg_migrator.py
            "
          else
            pyinstaller --onefile --name pg_migrator --add-data "src:src" --add-data "config_migrator.sample.ini:." $PYINSTALLER_OPTS pg_migrator.py
          fi

          BINARY_NAME="pg_migrator-${{ matrix.platform }}-python${{ matrix.python_version }}-v${VERSION}${EXE_EXT}"
          mv dist/pg_migrator${EXE_EXT} "dist/${BINARY_NAME}"

          # Generate SHA256
          cd dist
          if [ "${{ runner.os }}" == "Windows" ]; then
            powershell -Command "\$hash = (Get-FileHash -Algorithm SHA256 -Path '${BINARY_NAME}').Hash.ToLower(); \"\$hash  ${BINARY_NAME}\" | Out-File -FilePath '${BINARY_NAME}.sha256' -Encoding ascii"
          else
            sha256sum "${BINARY_NAME}" > "${BINARY_NAME}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: binary-${{ matrix.platform }}-python${{ matrix.python_version }}-v${{ env.VERSION }}
          path: dist/pg_migrator-*
          if-no-files-found: error

  # 1.5. Validate Linux Binaries on RHEL 8 (glibc backward compatibility check)
  validate-linux-binary:
    needs: build-binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v3

      - name: Extract Version
        id: info
        run: |
          VERSION=$(grep -oP '(?<=__version__ = ")[^"]+' pg_migrator.py)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Linux binary
        uses: actions/download-artifact@v3
        with:
          name: binary-linux-amd64-python${{ matrix.python_version }}-v${{ steps.info.outputs.VERSION }}
          path: dist/

      - name: Test Binary Execution in registry.access.redhat.com/ubi8/ubi container
        run: |
          bin_file="dist/pg_migrator-linux-amd64-python${{ matrix.python_version }}-v${{ steps.info.outputs.VERSION }}"
          chmod +x "$bin_file"
          # Run the binary inside an UBI 8 container to verify glibc 2.28 compatibility
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace registry.access.redhat.com/ubi8/ubi ./$bin_file --help
          echo "Execution on registry.access.redhat.com/ubi8/ubi succeeded! glibc compatibility verified."

  # 2. Create DEB and RPM packages (using nfpm)
  package-os:
    needs: validate-linux-binary
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v3

      - name: Extract Version
        id: info
        shell: python
        run: |
            import os
            import re
            with open("pg_migrator.py", "r", encoding="utf-8") as f:
                content = f.read()
                match = re.search(r'__version__ = "([^"]+)"', content)
                version = match.group(1) if match else "unknown"
                with open(os.environ['GITHUB_OUTPUT'], 'a', encoding="utf-8") as out:
                    out.write(f"VERSION={version}\n")
            print(f"Version: {version}")

      - name: Download Linux binary
        uses: actions/download-artifact@v3
        with:
          name: binary-linux-amd64-python${{ matrix.python_version }}-v${{ steps.info.outputs.VERSION }}
          path: dist/

      - name: Locate binary
        id: locate
        run: |
            echo "Listing dist/ directory:"
            ls -la dist/ || echo "dist/ not found!"
            # We know the exact name we uploaded
            bin_file="dist/pg_migrator-linux-amd64-python${{ matrix.python_version }}-v${{ steps.info.outputs.VERSION }}"
            if [ -f "$bin_file" ]; then
                echo "BIN_FILE=$bin_file" >> $GITHUB_OUTPUT
                echo "Found binary: $bin_file"
            else
                echo "Binary not found!"
                exit 1
            fi

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Create nfpm.yaml
        run: |
          cat <<EOF > nfpm.yaml
          name: "pg-logical-migrator-python${{ matrix.python_version }}"
          arch: "amd64"
          platform: "linux"
          version: "${{ steps.info.outputs.VERSION }}"
          section: "utils"
          priority: "extra"
          maintainer: "Jean-Marie Renouard <jmrenouard@gmail.com>"
          description: "PostgreSQL Logical Migration CLI Tool"
          vendor: "jmrenouard"
          homepage: "https://github.com/jmrenouard/pg_logical_migrator"
          license: "MIT"
          contents:
            - src: "${{ steps.locate.outputs.BIN_FILE }}"
              dst: "/usr/bin/pg_migrator"
          EOF

      - name: Build DEB and RPM
        run: |
          nfpm pkg --packager deb --target dist/
          nfpm pkg --packager rpm --target dist/
          cd dist
          for f in *.deb *.rpm; do sha256sum "$f" > "$f.sha256"; done

      - name: Upload OS packages
        uses: actions/upload-artifact@v3
        with:
          name: os-packages-python${{ matrix.python_version }}-v${{ steps.info.outputs.VERSION }}
          path: |
            dist/*.deb*
            dist/*.rpm*

  # 3. Build Python Wheel and Source Distribution
  package-python:
    needs: [build-binaries]
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.9", "3.11"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python_version }}

      - name: Extract Version
        id: info
        run: |
          VERSION=$(grep -oP '(?<=__version__ = ")[^"]+' pg_migrator.py)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: pip install build

      - name: Build Wheel and Sdist
        run: |
          rm -rf dist
          python -m build
          cd dist
          for f in *.whl; do
            mv "$f" "${f%.whl}-python${{ matrix.python_version }}.whl"
          done
          for f in *.tar.gz; do
            mv "$f" "${f%.tar.gz}-python${{ matrix.python_version }}.tar.gz"
          done
          for f in *; do sha256sum "$f" > "$f.sha256"; done

      - name: Upload Python assets
        uses: actions/upload-artifact@v3
        with:
          name: python-assets-python${{ matrix.python_version }}-v${{ steps.info.outputs.VERSION }}
          path: dist/*

  # 4. Create GitHub Release
  publish-release:
    needs: [build-binaries, package-os, package-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set Release Info
        id: rel_info
        shell: python
        run: |
            import os
            import re
            with open("pg_migrator.py", "r", encoding="utf-8") as f:
                content = f.read()
                match = re.search(r'__version__ = "([^"]+)"', content)
                version = match.group(1) if match else "unknown"

            ref = os.environ['GITHUB_REF']
            if ref.startswith('refs/tags/'):
                tag_name = ref.replace('refs/tags/', '')
                is_prerelease = 'false'
            else:
                tag_name = ref.replace('refs/heads/', '')
                is_prerelease = 'true'

            # Verify version matches tag if tag push
            if ref.startswith('refs/tags/') and tag_name != f"v{version}":
                print(f"::error::Tag {tag_name} does not match script version v{version}")
                exit(1)

            with open(os.environ['GITHUB_ENV'], 'a', encoding="utf-8") as env:
                env.write(f"VERSION={version}\n")
                env.write(f"TAG_NAME={tag_name}\n")
                env.write(f"IS_PRERELEASE={is_prerelease}\n")

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: all-artifacts/

      - name: Prepare Release folder
        run: |
          mkdir release-dist
          # Only pick files that match the CURRENT version to avoid leftovers from other runs
          find all-artifacts/ -type f \( -name "*${{ env.VERSION }}*" -o -name "*.sha256" \) -exec cp {} release-dist/ \;
          ls -R release-dist/

      - name: Generate Beautiful Release Notes
        run: |
          # 1. Start with the real release notes
          if [ -f "releases/v${{ env.VERSION }}.md" ]; then
            cat "releases/v${{ env.VERSION }}.md" > release_body.md
          else
            echo "# Release ${{ env.TAG_NAME }}" > release_body.md
          fi

          # 2. Add Deliverables Section
          {
            echo ""
            echo "---"
            echo "## Deliverables"
            echo ""
            echo "### Standalone Binaries"
            echo "| Platform | Architecture | Asset | Checksum |"
            echo "|---|---|---|---|"
            echo "| Linux (Python 3.9) | amd64 | \`pg_migrator-linux-amd64-python3.9-v${{ env.VERSION }}\` | [sha256] |"
            echo "| Linux (Python 3.11) | amd64 | \`pg_migrator-linux-amd64-python3.11-v${{ env.VERSION }}\` | [sha256] |"
            echo "| Windows (Python 3.9) | amd64 | \`pg_migrator-win-amd64-python3.9-v${{ env.VERSION }}.exe\` | [sha256] |"
            echo "| Windows (Python 3.11) | amd64 | \`pg_migrator-win-amd64-python3.11-v${{ env.VERSION }}.exe\` | [sha256] |"
            echo "| macOS (Python 3.9) | arm64 | \`pg_migrator-macos-arm64-python3.9-v${{ env.VERSION }}\` | [sha256] |"
            echo "| macOS (Python 3.11) | arm64 | \`pg_migrator-macos-arm64-python3.11-v${{ env.VERSION }}\` | [sha256] |"
            echo ""
            echo "### OS Packages"
            echo "| Format | Architecture | Python 3.9 | Python 3.11 |"
            echo "|---|---|---|---|"
            echo "| Debian/Ubuntu | amd64 | \`pg-logical-migrator-python3.9_${{ env.VERSION }}_amd64.deb\` | \`pg-logical-migrator-python3.11_${{ env.VERSION }}_amd64.deb\` |"
            echo "| RHEL/CentOS | amd64 | \`pg-logical-migrator-python3.9-${{ env.VERSION }}-1.x86_64.rpm\` | \`pg-logical-migrator-python3.11-${{ env.VERSION }}-1.x86_64.rpm\` |"
            echo ""
            echo "### Python Packages"
            echo "- **Wheel (3.9)**: \`pg_logical_migrator-${{ env.VERSION }}-py3-none-any-python3.9.whl\`"
            echo "- **Wheel (3.11)**: \`pg_logical_migrator-${{ env.VERSION }}-py3-none-any-python3.11.whl\`"
            echo "- **Source (3.9)**: \`pg_logical_migrator-${{ env.VERSION }}-python3.9.tar.gz\`"
            echo "- **Source (3.11)**: \`pg_logical_migrator-${{ env.VERSION }}-python3.11.tar.gz\`"
            echo ""
            echo "### Docker Images"
            echo "\`\`\`bash"
            echo "docker pull jmrenouard/pg_logical_migrator:${{ env.VERSION }}"
            echo "docker pull ghcr.io/${{ github.repository }}:${{ env.TAG_NAME }}"
            echo "\`\`\`"
            echo ""
            echo "---"
            echo "*Checksums (.sha256) are available in the assets list below.*"
          } >> release_body.md

      - name: Update GitHub Release and Upload Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create or update the release
          if ! gh release view "${{ env.TAG_NAME }}"; then
            gh release create "${{ env.TAG_NAME }}" \
              --title "${{ env.TAG_NAME }}" \
              --notes-file release_body.md \
              $(if [ "${{ env.IS_PRERELEASE }}" = "true" ]; then echo "--prerelease"; fi)
          else
            gh release edit "${{ env.TAG_NAME }}" \
              --title "${{ env.TAG_NAME }}" \
              --notes-file release_body.md \
              $(if [ "${{ env.IS_PRERELEASE }}" = "true" ]; then echo "--prerelease"; fi)
          fi

          # Upload all files, clobbering existing ones
          gh release upload "${{ env.TAG_NAME }}" release-dist/* --clobber
