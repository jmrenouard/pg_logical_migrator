# Publish PyInstaller standalone binary on tag push or manual dispatch
# Complements docker-publish.yml (Docker Hub) and python-package.yml (GHCR + CI)

name: PyInstaller Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed for GitHub Release asset upload

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # Future: add macos-latest, windows-latest for cross-platform binaries

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Extract version from pg_migrator.py
        id: version
        run: |
          VERSION=$(grep -oP '(?<=__version__ = ")[^"]+' pg_migrator.py)
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from pg_migrator.py"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Pre-publish validation
        run: |
          echo "Checking for critical files..."
          for file in pg_migrator.py requirements.txt pg_migrator.spec LICENSE; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Critical file missing: $file"
              exit 1
            fi
            echo "✔ Found: $file"
          done

          echo "Checking for release notes: releases/v${{ env.VERSION }}.md..."
          if [ ! -f "releases/v${{ env.VERSION }}.md" ]; then
            echo "WARNING: Release notes missing: releases/v${{ env.VERSION }}.md (non-blocking)"
          else
            echo "✔ Found release notes"
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "Checking tag consistency (Tag: $TAG vs Version: v${{ env.VERSION }})..."
            if [ "v${{ env.VERSION }}" != "$TAG" ]; then
              echo "ERROR: Tag $TAG does not match version in pg_migrator.py (v${{ env.VERSION }})"
              exit 1
            fi
            echo "✔ Tag matches script version"
          else
            echo "ℹ Skipping tag consistency check (not a tag push)"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onefile \
            --name pg_migrator \
            --add-data "src:src" \
            --add-data "config_migrator.sample.ini:." \
            pg_migrator.py

      - name: Verify binary runs
        run: |
          chmod +x ./dist/pg_migrator
          ./dist/pg_migrator --version
          ./dist/pg_migrator --help

      - name: Rename binary with version and platform
        run: |
          PLATFORM="linux-amd64"
          BINARY_NAME="pg_migrator-${PLATFORM}-v${{ env.VERSION }}"
          mv dist/pg_migrator "dist/${BINARY_NAME}"
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV
          echo "Binary: dist/${BINARY_NAME}"

      - name: Generate SHA256 checksum
        run: |
          cd dist
          sha256sum "${{ env.BINARY_NAME }}" > "${{ env.BINARY_NAME }}.sha256"
          cat "${{ env.BINARY_NAME }}.sha256"

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}
          path: |
            dist/${{ env.BINARY_NAME }}
            dist/${{ env.BINARY_NAME }}.sha256
          retention-days: 90

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ env.VERSION }}"
          body: |
            ## pg_logical_migrator v${{ env.VERSION }}

            ### Downloads

            | Asset | Description |
            |---|---|
            | `${{ env.BINARY_NAME }}` | Standalone Linux amd64 binary (PyInstaller) |
            | `${{ env.BINARY_NAME }}.sha256` | SHA256 checksum |

            ### Docker Images

            ```bash
            docker pull jmrenouard/pg_logical_migrator:${{ env.VERSION }}
            docker pull ghcr.io/jmrenouard/pg_logical_migrator:v${{ env.VERSION }}
            ```

            - [Docker Hub](https://hub.docker.com/r/jmrenouard/pg_logical_migrator)
            - [GHCR](https://github.com/jmrenouard/pg_logical_migrator/pkgs/container/pg_logical_migrator)
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/${{ env.BINARY_NAME }}
            dist/${{ env.BINARY_NAME }}.sha256
