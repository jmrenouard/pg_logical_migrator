# CI pipeline: lint, test, build Docker image, and produce Python assets
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

# Required to push Docker images to GitHub Container Registry (ghcr.io)
permissions:
  contents: write
  packages: write

jobs:
  # 1. Lint & Test
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Prepare test config
        run: cp config_migrator.sample.ini config_migrator.ini
      - name: Start Docker Test Environment
        run: make env-up
      - name: Run Tests with Coverage
        run: |
          PYTHONPATH=. pytest tests/unit/ tests/integration/test_tui_e2e.py \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html:RESULTS/coverage
      - name: Stop Docker Test Environment
        if: always()
        run: make env-down
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            RESULTS/coverage/

  # 2. Build & Push Docker Image (ghcr.io)
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. Build Python Wheel and Source Distribution
  build-python-assets:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP '(?<=__version__ = ")[^"]+' pg_migrator.py)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build Python Assets
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-assets-v${{ steps.version.outputs.VERSION }}
          path: dist/*
          retention-days: 30
