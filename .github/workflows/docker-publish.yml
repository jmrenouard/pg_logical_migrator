# Publish Docker image to Docker Hub on tag push or manual dispatch
# Complements python-package.yml which publishes to GHCR

name: Docker Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from pg_migrator.py
        id: version
        run: |
          VERSION=$(grep -oP '(?<=__version__ = ")[^"]+' pg_migrator.py)
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from pg_migrator.py"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Pre-publish validation
        run: |
          echo "Checking for critical files..."
          for file in pg_migrator.py Dockerfile LICENSE; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Critical file missing: $file"
              exit 1
            fi
            echo "✔ Found: $file"
          done

          echo "Checking for release notes: releases/v${{ env.VERSION }}.md..."
          if [ ! -f "releases/v${{ env.VERSION }}.md" ]; then
            echo "WARNING: Release notes missing: releases/v${{ env.VERSION }}.md (non-blocking)"
          else
            echo "✔ Found release notes"
          fi

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            echo "Checking tag consistency (Tag: $TAG vs Version: v${{ env.VERSION }})..."
            if [ "v${{ env.VERSION }}" != "$TAG" ]; then
              echo "ERROR: Tag $TAG does not match version in pg_migrator.py (v${{ env.VERSION }})"
              exit 1
            fi
            echo "✔ Tag matches script version"
          else
            echo "ℹ Skipping tag consistency check (not a tag push)"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_LOGIN }}
          password: ${{ secrets.DOCKER_USER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            jmrenouard/pg_logical_migrator:latest
            jmrenouard/pg_logical_migrator:${{ env.VERSION }}
          labels: |
            org.opencontainers.image.title=pg_logical_migrator
            org.opencontainers.image.description=PostgreSQL logical replication migration tool
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.source=https://github.com/jmrenouard/pg_logical_migrator
            org.opencontainers.image.licenses=GPL-3.0
          cache-from: type=gha
          cache-to: type=gha,mode=max
