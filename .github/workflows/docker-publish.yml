name: Docker Publish

on:
  push:
    tags: ["v*"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_LOGIN }}
          password: ${{ secrets.DOCKER_USER_PASSWORD }}

      - name: Extract version from pg_migrator.py
        id: version
        run: |
          VERSION=$(grep '__version__' pg_migrator.py | sed "s/.*\"\(.*\)\".*/\1/")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Pre-publish validation
        run: |
          echo "Checking for critical files..."
          CRITICAL_FILES=("pg_migrator.py" "Dockerfile" "LICENSE")
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Critical file missing: $file"
              exit 1
            fi
            echo "✔ Found: $file"
          done

          echo "Checking for release notes: releases/v${{ env.VERSION }}.md..."
          if [ ! -f "releases/v${{ env.VERSION }}.md" ]; then
            echo "ERROR: Release notes missing: releases/v${{ env.VERSION }}.md"
            exit 1
          fi
          echo "✔ Found release notes"

          TAG=${GITHUB_REF#refs/tags/}
          echo "Checking tag consistency (Tag: $TAG vs Version: v${{ env.VERSION }})..."
          if [ "v${{ env.VERSION }}" != "$TAG" ]; then
            echo "ERROR: Tag $TAG does not match version in pg_migrator.py (v${{ env.VERSION }})"
            exit 1
          fi
          echo "✔ Tag matches script version"

      - name: Extract release notes
        id: release_notes
        run: |
          {
            echo 'RELEASE_NOTES<<EOF'
            cat "releases/v${{ env.VERSION }}.md"
            echo 'EOF'
          } >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            jmrenouard/pg_logical_migrator:latest
            jmrenouard/pg_logical_migrator:${{ env.VERSION }}
          labels: |
            org.opencontainers.image.title=pg_logical_migrator
            org.opencontainers.image.description=**pg_logical_migrator** is a Python-based utility to orchestrate database migrations for PostgreSQL using logical replication.
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.licenses=GPL-3.0
            com.pg_logical_migrator.release-notes=${{ env.RELEASE_NOTES }}
