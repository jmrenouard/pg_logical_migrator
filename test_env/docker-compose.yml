services:
  source_db:
    image: postgres:16
    container_name: pg_source
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: test_migration
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10", "-c", "max_wal_senders=10"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_migration"]
      interval: 5s
      timeout: 5s
      retries: 5

  target_db:
    image: postgres:17
    container_name: pg_target
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: test_migration
    ports:
      - "5433:5432"
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10", "-c", "max_wal_senders=10"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_migration"]
      interval: 5s
      timeout: 5s
      retries: 5
